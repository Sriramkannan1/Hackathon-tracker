<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Calendar | Hackathon Command Center
    </title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        .calendar-wrapper {

            background: #FFFFFF;

            border-radius: 24px;

            padding: 30px;

            border: 1px solid #FED7AA;

            box-shadow:
                0 12px 35px rgba(249, 115, 22, .08);
        }

        .calendar-header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 30px;
        }

        .calendar-header h2 {

            color: #111827;

            font-size: 28px;

            font-weight: 800;
        }

        .calendar-grid {

            display: grid;

            grid-template-columns:
                repeat(7, 1fr);

            gap: 12px;
        }

        .calendar-weekday {

            text-align: center;

            font-weight: 700;

            color: #EA580C;

            background: #FFF7ED;

            border: 1px solid #FED7AA;

            border-radius: 12px;

            padding: 14px;
        }

        .calendar-cell {

            min-height: 120px;

            background: #FFFFFF;

            border-radius: 14px;

            padding: 10px;

            border: 1px solid #FED7AA;

            overflow: hidden;

            transition: .25s ease;

            color: #1F2937;
        }

        .calendar-cell:hover {

            transform: translateY(-3px);

            box-shadow:
                0 8px 18px rgba(249, 115, 22, .10);

            background: #FFFDF8;
        }

        .calendar-nav {

            display: flex;

            gap: 12px;
        }

        .calendar-nav button {

            padding: 12px 18px;

            border-radius: 12px;

            border: none;

            cursor: pointer;

            background: linear-gradient(135deg,
                    #FB923C,
                    #EA580C);

            color: white;

            font-size: 15px;

            font-weight: 600;

            transition: .25s ease;
        }

        .calendar-nav button:hover {

            transform: translateY(-2px);

            box-shadow:
                0 10px 20px rgba(249, 115, 22, .20);
        }

        .legend {

            display: flex;

            flex-wrap: wrap;

            gap: 18px;

            margin-top: 30px;

            padding-top: 20px;

            border-top: 1px solid #FED7AA;
        }

        .legend-item {

            display: flex;

            align-items: center;

            gap: 10px;

            color: #374151;

            font-weight: 500;
        }

        .legend-dot {

            width: 14px;

            height: 14px;

            border-radius: 50%;
        }

        .legend-item:nth-child(1) .legend-dot {

            background: #F59E0B;
        }

        .legend-item:nth-child(2) .legend-dot {

            background: #22C55E;
        }

        .legend-item:nth-child(3) .legend-dot {

            background: #EF4444;
        }

        .legend-item:nth-child(4) .legend-dot {

            background: #8B5CF6;
        }

        .calendar-event {

            padding: 4px 8px;

            margin-top: 5px;

            border-radius: 8px;

            font-size: 11px;

            font-weight: 600;

            color: white;

            overflow: hidden;

            white-space: nowrap;

            text-overflow: ellipsis;
        }

        .calendar-event.ppt {

            background: #F59E0B;
        }

        .calendar-event.video {

            background: #22C55E;
        }

        .calendar-event.report {

            background: #EF4444;
        }

        .calendar-event.round {

            background: #8B5CF6;
        }

        @media(max-width:992px) {

            .calendar-grid {

                grid-template-columns:
                    repeat(7, minmax(80px, 1fr));

                overflow-x: auto;
            }

            .calendar-cell {

                min-height: 100px;
            }
        }

        @media(max-width:768px) {

            .calendar-header {

                flex-direction: column;

                gap: 20px;
            }

            .calendar-header h2 {

                font-size: 24px;
            }

            .legend {

                justify-content: center;
            }
        }
    </style>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">

                <div class="logo-icon">
                    🚀
                </div>

                <div class="logo-text">

                    <h2>
                        Hackathon Hub
                    </h2>

                    <span>
                        Command Center
                    </span>

                </div>

            </div>

            <nav class="nav-links">

                <a href="dashboard.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>

                <a href="register.html">
                    <i class="fas fa-plus-circle"></i>
                    <span>Register</span>
                </a>

                <a href="agenda.html">
                    <i class="fas fa-list-check"></i>
                    <span>Agenda</span>
                </a>

                <a href="recommendations.html">
                    <i class="fas fa-lightbulb"></i>
                    <span>Recommendations</span>
                </a>

                <a href="calendar.html" class="active">

                    <i class="fas fa-calendar-days"></i>
                    <span>Calendar</span>

                </a>

                <a href="notifications.html">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </a>

                <a href="#" onclick="logoutUser()">

                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>

                </a>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <div class="page-header">

                <div class="page-title">

                    <h1>
                        Calendar
                    </h1>

                    <p>
                        View all hackathon deadlines,
                        rounds and submissions.
                    </p>

                </div>

            </div>

            <div class="calendar-wrapper">

                <div class="calendar-header">

                    <div class="calendar-nav">

                        <button onclick="previousMonth()">

                            <i class="fas fa-chevron-left"></i>

                        </button>

                        <button onclick="nextMonth()">

                            <i class="fas fa-chevron-right"></i>

                        </button>

                    </div>

                    <h2 id="monthYear">

                    </h2>

                </div>

                <!-- WEEKDAYS -->

                <div class="calendar-grid">

                    <div class="calendar-weekday">
                        Sun
                    </div>

                    <div class="calendar-weekday">
                        Mon
                    </div>

                    <div class="calendar-weekday">
                        Tue
                    </div>

                    <div class="calendar-weekday">
                        Wed
                    </div>

                    <div class="calendar-weekday">
                        Thu
                    </div>

                    <div class="calendar-weekday">
                        Fri
                    </div>

                    <div class="calendar-weekday">
                        Sat
                    </div>

                </div>

                <div id="calendarDays" class="calendar-grid">

                </div>

                <!-- LEGEND -->

                <div class="legend">

                    <div class="legend-item">
                        <div class="legend-dot" style="
                    background:#f59e0b;
                    ">
                        </div>
                        PPT
                    </div>

                    <div class="legend-item">
                        <div class="legend-dot" style="
                    background:#22c55e;
                    ">
                        </div>
                        Video
                    </div>

                    <div class="legend-item">
                        <div class="legend-dot" style="
                    background:#ef4444;
                    ">
                        </div>
                        Report
                    </div>

                    <div class="legend-item">
                        <div class="legend-dot" style="
                    background:#8b5cf6;
                    ">
                        </div>
                        Round
                    </div>

                </div>

            </div>

            <div class="footer">

                © 2026 Hackathon Command Center

            </div>

        </main>

    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/calendar.js"></script>

</body>

</html>
