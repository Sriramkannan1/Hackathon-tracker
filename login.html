<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Command Center - Login</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="auth-wrapper">

        <div class="auth-card fade-in">

            <div style="text-align:center;margin-bottom:25px;">

                <div style="
                    width:80px;
                    height:80px;
                    margin:auto;
                    border-radius:20px;
                    background:linear-gradient(135deg,#38bdf8,#2563eb);
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    font-size:34px;
                    color:white;
                    margin-bottom:15px;
                ">
                    <i class="fas fa-trophy"></i>
                </div>

                <h1>Hackathon Command Center</h1>

                <p>
                    Manage registrations, deadlines, rounds,
                    submissions and recommendations.
                </p>

            </div>

            <div id="loginAlert"></div>

            <div class="auth-tabs">


                <button class="tab-btn active" onclick="showLogin()" id="loginTab">

                    Login

                </button>

                <button class="tab-btn" onclick="showSignup()" id="signupTab">

                    Sign Up

                </button>


            </div>

            <div id="loginAlert"></div>

            <!-- LOGIN FORM -->

            <form id="loginForm">


                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email" id="loginEmail" class="form-control" required>

                </div>

                <br>

                <div class="form-group">

                    <label>Password</label>

                    <input type="password" id="loginPassword" class="form-control" required>

                </div>

                <br>

                <button type="submit" class="btn btn-primary" style="width:100%;">

                    Login

                </button>


            </form>

            <!-- SIGNUP FORM -->

            <form id="signupForm" style="display:none;">

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text" id="name" class="form-control" required>

                </div>

                <br>

                <div class="form-group">

                    <label>College</label>

                    <input type="text" id="college" class="form-control" required>

                </div>

                <br>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" id="signupEmail" class="form-control" required>

                </div>

                <br>

                <div class="form-group">

                    <label>Password</label>

                    <input type="password" id="signupPassword" class="form-control" required>

                </div>

                <br>

                <div class="form-group">

                    <label>Confirm Password</label>

                    <input type="password" id="confirmPassword" class="form-control" required>

                </div>

                <br>

                <button type="submit" class="btn btn-primary" style="width:100%;">

                    Create Account

                </button>


            </form>



        </div>

    </div>

    <script src="assets/js/app.js"></script>

    <script>

        const loginForm =
            document.getElementById("loginForm");

        loginForm.addEventListener(
            "submit",
            function (e) {

                e.preventDefault();

                const email =
                    document
                        .getElementById("loginEmail")
                        .value
                        .trim();

                const password =
                    document
                        .getElementById("loginPassword")
                        .value
                        .trim();

                if (email === "" || password === "") {
                    showAlert(
                        "Please fill all fields",
                        "danger"
                    );
                    return;
                }

                loginUser(email, password);

            }
        );

        function showAlert(message, type) {

            const alertBox =
                document.getElementById(
                    "loginAlert"
                );

            alertBox.innerHTML =
                `
            <div class="alert alert-${type}">
                ${message}
            </div>
            `;

            setTimeout(() => {
                alertBox.innerHTML = "";
            }, 3000);

        }
        function showLogin() {
            document.getElementById(
                "loginForm"
            ).style.display = "block";

            document.getElementById(
                "signupForm"
            ).style.display = "none";

            document.getElementById(
                "loginTab"
            ).classList.add("active");

            document.getElementById(
                "signupTab"
            ).classList.remove("active");


        }

        function showSignup() {

            document.getElementById(
                "loginForm"
            ).style.display = "none";

            document.getElementById(
                "signupForm"
            ).style.display = "block";

            document.getElementById(
                "signupTab"
            ).classList.add("active");

            document.getElementById(
                "loginTab"
            ).classList.remove("active");


        }

    </script>

</body>

</html>
